services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://maritime:maritime@postgres:5432/maritime
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080
      AUTH_COOKIE_SECURE: "false"
      TZ: Asia/Kolkata
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "5173:80"
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: maritime
      POSTGRES_USER: maritime
      POSTGRES_PASSWORD: maritime
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maritime -d maritime"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
