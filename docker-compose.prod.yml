services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/OWNER/REPO-backend:latest}
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-maritime}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-maritime}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/OWNER/REPO-frontend:latest}
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-maritime}
      POSTGRES_USER: ${POSTGRES_USER:-maritime}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-maritime} -d ${POSTGRES_DB:-maritime}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres-data:
